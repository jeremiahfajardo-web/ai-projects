name: secret-scan

# gitleaks secret scan — CI backstop to the .pre-commit-config.yaml hook.
# Catches a committed secret in a PR even when a contributor hasn't run
# `pre-commit install` locally.
#
# Scans the working TREE (`gitleaks dir`), NOT git history: the pre-rework
# MCP_API_KEY leak lives only in old history (rotated + accepted on 2026-06-28),
# so a history scan would fail on it forever. The tree scan flags anything a PR
# actually introduces into the checked-out files — the same scope as the hook.
#
# False positive on a placeholder? Add a .gitleaks.toml allowlist entry.

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks (secret scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install gitleaks
        run: |
          set -euo pipefail
          VERSION=8.30.1
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/
          gitleaks version
      - name: Scan working tree for secrets
        run: gitleaks dir . --redact --verbose --exit-code 1
