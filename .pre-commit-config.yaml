# Pre-commit hooks — secret scanning.
#
# gitleaks scans the staged diff for committed secrets (API keys, tokens,
# passwords) and blocks the commit if any are found. Mirrors the secret-scan
# used in the rag-comparison-mvp project. Added 2026-06-28 after the real
# MCP_API_KEY was found committed in a tracked smoke script + local settings.
#
# One-time setup (per clone):
#   pip install pre-commit
#   pre-commit install
#
# Scan the whole working tree on demand:
#   pre-commit run --all-files
#
# Note: this scans new commits / the working tree, not existing history.
repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
